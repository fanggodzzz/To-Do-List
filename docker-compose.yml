version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: todolist-mysql
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -uroot -p${MYSQL_ROOT_PASSWORD} || exit 1",
        ]
      timeout: 20s
      retries: 10
    networks:
      - todolist-network

  backend:
    build: ./Backend
    container_name: todolist-backend
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - todolist-network

  frontend:
    build: ./Frontend
    container_name: todolist-frontend
    ports:
      - "1010:1010"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - todolist-network

volumes:
  mysql-data:

networks:
  todolist-network:
    driver: bridge

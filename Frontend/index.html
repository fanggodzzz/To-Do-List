<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Task Calendar - Welcome</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="welcome-shell">
      <section class="welcome-card">
        <div class="welcome-content">
          <h1 class="welcome-title">Task Calendar</h1>
          <p class="welcome-subtitle">Manage your tasks with ease</p>

          <div class="welcome-body">
            <p>
              A modern task management application with calendar-based planning.
            </p>
          </div>

          <button
            class="primary-btn welcome-btn"
            id="loginToUseBtn"
            type="button"
          >
            Login to use
          </button>

          <div class="welcome-footer">
            <p class="author-info">
              <strong>Author:</strong> Nguyen Hoang Thanh PHAN
            </p>
            <a
              href="https://github.com/fanggodzzz/To-Do-List"
              target="_blank"
              class="github-link"
            >
              View on GitHub
            </a>
          </div>
        </div>
      </section>
    </main>

    <script src="app-welcome.js"></script>
  </body>
</html>

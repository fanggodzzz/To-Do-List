<!doctype html>
<html lang="en" xmlns="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>To-do List Application</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <h4><i class="bi bi-calendar-check-fill"></i> All your tasks</h4>
    </div>
    <div class="todo-list">
      <div th:each="todo : ${todos}" class="todo-item">
        <div class="d-flex align-items-center">
          <a href="@update/{todo.id}" class="edit-btn">
            <i
              class="bi bi-pencil-fill"
              th:classappend="${todo.completed} ? 'bi-check-circle-fill' : 'bi-circle uncheck-icon'"
            ></i>
          </a>
          <span
            th:text="${todo.title}"
            th:classappend="${todo.completed} ? 'COMPLETED' : 'NOT COMPLETED'"
          ></span>
        </div>

        <a th:href="@{'/delete/' + ${todo.id}}" class="delete-btn">
          <i class="bi bi-trash-fill"></i>
        </a>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
